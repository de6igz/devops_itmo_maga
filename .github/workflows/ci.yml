name: CI

on:
  push:
    branches:
      - main
      - lab-3
      - lab-4
  pull_request:

jobs:
  backend-test:
    runs-on: ubuntu-latest

    defaults:
      run:
        working-directory: backend
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: "1.26.1"
      - run: go mod download
      - run: go test ./... -coverpkg=./... -coverprofile=coverage.out -covermode=atomic

  backend-build:
    runs-on: ubuntu-latest
    needs: backend-test
    defaults:
      run:
        working-directory: backend
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: "1.26.1"
      - run: go mod download
      - run: go build ./...



  frontend-test:
    runs-on: ubuntu-latest
    needs: backend-build
    defaults:
      run:
        working-directory: frontend
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm
          cache-dependency-path: frontend/package-lock.json
      - run: npm ci
      - run: npm test

  frontend-build:
    runs-on: ubuntu-latest
    needs: frontend-test
    defaults:
      run:
        working-directory: frontend
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm
          cache-dependency-path: frontend/package-lock.json
      - run: npm ci
      - run: npm run build

  sonarqube:
    name: SonarQube quality gate
    runs-on: ubuntu-latest
    needs:
      - backend-build
      - frontend-build
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: actions/setup-go@v5
        with:
          go-version: "1.26.1"

      - uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Backend coverage
        working-directory: backend
        run: |
          go mod download
          go test ./... -coverpkg=./... -coverprofile=coverage.out -covermode=atomic

      - name: Frontend coverage
        working-directory: frontend
        run: |
          npm ci
          npm run test:coverage

      - name: SonarCloud scan
        uses: SonarSource/sonarcloud-github-action@master
        with:
          args: >
            -Dsonar.projectKey=de6igz_devops_itmo_maga
            -Dsonar.organization=de6igz
            -Dsonar.qualitygate.wait=true
            -Dsonar.qualitygate.timeout=300
        env:
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}

  docker-publish:
    name: Docker publish (${{ matrix.service }})
    runs-on: ubuntu-latest
    needs: sonarqube
    if: github.event_name == 'push'
    permissions:
      contents: read
      packages: write
    strategy:
      matrix:
        include:
          - service: backend
            context: ./backend
            image: ghcr.io/de6igz/devops_backend
          - service: frontend
            context: ./frontend
            image: ghcr.io/de6igz/devops_frontend
    steps:
      - uses: actions/checkout@v4

      - uses: docker/setup-buildx-action@v3

      - uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - uses: docker/metadata-action@v5
        id: metadata
        with:
          images: ${{ matrix.image }}
          tags: |
            type=raw,value=latest,enable={{is_default_branch}}
            type=sha,format=short

      - uses: docker/build-push-action@v6
        with:
          context: ${{ matrix.context }}
          file: ${{ matrix.context }}/Dockerfile
          push: true
          tags: ${{ steps.metadata.outputs.tags }}
          labels: ${{ steps.metadata.outputs.labels }}

  telegram-notify:
    name: Telegram notify
    runs-on: ubuntu-latest
    if: always()
    needs:
      - backend-test
      - backend-build
      - frontend-test
      - frontend-build
      - sonarqube
      - docker-publish
    steps:
      - name: Send pipeline status
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
          PIPELINE_STATUS: ${{ contains(needs.*.result, 'failure') && 'failed' || contains(needs.*.result, 'cancelled') && 'cancelled' || 'success' }}
          RUN_URL: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}
        run: |
          if [ -z "$TELEGRAM_BOT_TOKEN" ] || [ -z "$TELEGRAM_CHAT_ID" ]; then
            echo "Telegram secrets are not configured; skipping notification."
            exit 0
          fi

          SHORT_SHA="${GITHUB_SHA:0:7}"
          MESSAGE=$(printf "CI %s: %s@%s %s\n%s" "$PIPELINE_STATUS" "$GITHUB_REPOSITORY" "$GITHUB_REF_NAME" "$SHORT_SHA" "$RUN_URL")

          curl -sS -X POST "https://api.telegram.org/bot${TELEGRAM_BOT_TOKEN}/sendMessage" \
            -d chat_id="${TELEGRAM_CHAT_ID}" \
            --data-urlencode "text=${MESSAGE}"
