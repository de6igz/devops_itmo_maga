services:
  postgres:
    image: postgres:16-alpine
    container_name: game-catalog-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: game_catalog
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d game_catalog"]
      interval: 10s
      timeout: 5s
      retries: 5

  backend:
    build:
      context: ./backend
    container_name: game-catalog-backend
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      PORT: "3000"
      DATABASE_URL: postgres://postgres:postgres@postgres:5432/game_catalog?sslmode=disable
    ports:
      - "3000:3000"
    volumes:
      - backend_blob:/app/blob

  frontend:
    build:
      context: ./frontend
    container_name: game-catalog-frontend
    restart: unless-stopped
    depends_on:
      - backend
    ports:
      - "5173:80"

volumes:
  postgres_data:
  backend_blob:
